spring:
  application:
    name: margins-back
  datasource:
    url: ${MARGINS_DB_URL:jdbc:mysql://localhost:${MARGINS_MYSQL_PORT:3306}/${MARGINS_MYSQL_DATABASE:margins}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MARGINS_MYSQL_USER:margins}
    password: ${MARGINS_MYSQL_PASSWORD:margins-pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

margins:
  auth:
    mode: single-user
    single-user:
      username: ${MARGINS_SINGLE_USER_USERNAME:peacepiece}
      display-name: ${MARGINS_SINGLE_USER_DISPLAY_NAME:peacepiece}
      password: ${MARGINS_SINGLE_USER_PASSWORD:}
    jwt:
      issuer: ${MARGINS_AUTH_JWT_ISSUER:margins}
      secret: ${MARGINS_AUTH_JWT_SECRET:margins-local-dev-secret-change-before-production}
      ttl-seconds: ${MARGINS_AUTH_JWT_TTL_SECONDS:86400}
  ai:
    provider: openai
    streaming-ready: true
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-5.5}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:30}
  book-search:
    enabled: ${MARGINS_BOOK_SEARCH_ENABLED:true}
    ai-fallback-enabled: ${MARGINS_BOOK_SEARCH_AI_FALLBACK_ENABLED:false}
    provider: ${MARGINS_BOOK_SEARCH_PROVIDER:google}
    base-url: ${MARGINS_BOOK_SEARCH_BASE_URL:https://openlibrary.org}
    google-base-url: ${GOOGLE_BOOKS_BASE_URL:https://www.googleapis.com}
    google-api-key: ${GOOGLE_BOOKS_API_KEY:}
    timeout-seconds: ${MARGINS_BOOK_SEARCH_TIMEOUT_SECONDS:5}
    limit: ${MARGINS_BOOK_SEARCH_LIMIT:5}
