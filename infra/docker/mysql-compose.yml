services:
  mysql:
    image: mysql:8.4
    container_name: margins-mysql
    ports:
      - "${MARGINS_MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MARGINS_MYSQL_ROOT_PASSWORD:-margins-root}"
      MYSQL_DATABASE: "${MARGINS_MYSQL_DATABASE:-margins}"
      MYSQL_USER: "${MARGINS_MYSQL_USER:-margins}"
      MYSQL_PASSWORD: "${MARGINS_MYSQL_PASSWORD:-margins-pass}"
    volumes:
      - margins_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  margins_mysql_data:
