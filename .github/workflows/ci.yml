name: Margins CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-package:
    name: Build, test, and package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install frontend dependencies
        working-directory: front
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: front
        run: npx playwright install chromium

      - name: Node harness quality audit
        run: npm run quality:full -- -SkipBackend -SkipFrontendBuild

      - name: Backend tests
        run: npm run back:test

      - name: Frontend unit tests
        working-directory: front
        run: npm run test:unit

      - name: Frontend build
        working-directory: front
        run: npm run build

      - name: Frontend production selector check
        working-directory: front
        run: npm run verify:production-selectors

      - name: Build release artifact
        run: npm run deploy:build -- --skip-tests

      - name: Verify release artifact
        run: npm run deploy:verify

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: margins-release-${{ matrix.os }}
          path: infra/artifacts/margins-release.zip
          if-no-files-found: error
